# nginx reverse proxy for the ZASS API.
#
# Serves the API at https://api.kalande.net and forwards to the Node process on
# 127.0.0.1:8000. TLS is added automatically by certbot (see DEPLOYMENT.md).
#
# Install:
#   sudo cp deploy/nginx-api.conf /etc/nginx/sites-available/zass
#   sudo ln -s /etc/nginx/sites-available/zass /etc/nginx/sites-enabled/zass
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.kalande.net   # provisions HTTPS + auto-renewal

server {
    listen 80;
    listen [::]:80;
    server_name api.kalande.net;

    # Allow large-ish JSON bodies (class/school broadcasts, etc.).
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
